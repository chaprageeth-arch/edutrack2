<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Professional Chess Clock</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

.container {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.clock {
    width: 220px;
    height: 180px;
    background: #222;
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    cursor: pointer;
    transition: 0.2s;
}

.active {
    background: #00aaff;
}

button, input {
    padding: 10px;
    margin: 5px;
    font-size: 16px;
}
</style>
</head>

<body>

<h1>♟️ Professional Chess Clock</h1>

<div>
    ⬜ P1: <input id="p1time" type="number" value="5" min="1"> min
    ⬛ P2: <input id="p2time" type="number" value="5" min="1"> min
</div>

<div class="container">
    <div id="p1" class="clock active">
        <div>PLAYER 1</div>
        <div id="t1">5:00</div>
        <button onclick="switchTurn(2)">▶ Start / Switch</button>
    </div>

    <div id="p2" class="clock">
        <div>PLAYER 2</div>
        <div id="t2">5:00</div>
        <button onclick="switchTurn(1)">▶ Start / Switch</button>
    </div>
</div>

<button onclick="startGame()">Start Game</button>
<button onclick="pauseGame()">Pause</button>
<button onclick="resetGame()">Reset</button>

<script>
let time1 = 300;
let time2 = 300;
let active = 1;
let running = false;
let interval = null;

const p1 = document.getElementById("p1");
const p2 = document.getElementById("p2");

function format(t){
    let m = Math.floor(t / 60);
    let s = t % 60;
    return `${m}:${s.toString().padStart(2,'0')}`;
}

function update(){
    document.getElementById("t1").innerText = format(time1);
    document.getElementById("t2").innerText = format(time2);
}

function tick(){
    if(!running) return;

    if(active === 1){
        time1--;
        if(time1 <= 0) time1 = 0;
    } else {
        time2--;
        if(time2 <= 0) time2 = 0;
    }

    update();
}

function startGame(){
    let m1 = parseInt(document.getElementById("p1time").value);
    let m2 = parseInt(document.getElementById("p2time").value);

    time1 = m1 * 60;
    time2 = m2 * 60;

    active = 1;
    running = true;

    p1.classList.add("active");
    p2.classList.remove("active");

    if(interval) clearInterval(interval);
    interval = setInterval(tick, 1000);

    update();
}

function switchTurn(next){
    if(!running) return;

    active = next;

    p1.classList.toggle("active", active === 1);
    p2.classList.toggle("active", active === 2);
}

function pauseGame(){
    running = !running;
}

function resetGame(){
    running = false;
    clearInterval(interval);

    let m1 = parseInt(document.getElementById("p1time").value);
    let m2 = parseInt(document.getElementById("p2time").value);

    time1 = m1 * 60;
    time2 = m2 * 60;

    active = 1;

    p1.classList.add("active");
    p2.classList.remove("active");

    update();
}
</script>

</body>
</html>
