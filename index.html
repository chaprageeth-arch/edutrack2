<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daham Denuwan</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#0e0e10;
    font-family: system-ui, Arial;
    color:#eaeaea;
}

.top {
    margin-bottom:20px;
    display:flex;
    gap:10px;
}

input{
    width:70px;
    padding:8px;
    background:#1a1a1d;
    border:1px solid #2a2a2e;
    color:#fff;
    outline:none;
    text-align:center;
    border-radius:6px;
}

.clock-wrap{
    display:flex;
    gap:18px;
}

.clock{
    width:220px;
    height:160px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:52px;
    background:#151518;
    border:1px solid #2a2a2e;
    border-radius:14px;
    cursor:pointer;
    user-select:none;
    transition:0.15s;
}

.active{
    border-color:#4aa3ff;
    color:#4aa3ff;
}

.controls{
    margin-top:18px;
    display:flex;
    gap:10px;
}

button{
    padding:8px 14px;
    background:#1a1a1d;
    border:1px solid #2a2a2e;
    color:#eaeaea;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    border-color:#4aa3ff;
}
</style>
</head>

<body>

<div class="top">
    <input id="t1set" type="number" value="5" min="1">
    <input id="t2set" type="number" value="5" min="1">
</div>

<div class="clock-wrap">
    <div id="c1" class="clock active">5:00</div>
    <div id="c2" class="clock">5:00</div>
</div>

<div class="controls">
    <button onclick="start()">Start</button>
    <button onclick="pause()">Pause</button>
    <button onclick="reset()">Reset</button>
</div>

<script>
let t1 = 300;
let t2 = 300;
let active = 1;
let running = false;
let timer = null;

const c1 = document.getElementById("c1");
const c2 = document.getElementById("c2");

function fmt(t){
    let m = Math.floor(t/60);
    let s = t%60;
    return `${m}:${s.toString().padStart(2,'0')}`;
}

function draw(){
    c1.textContent = fmt(t1);
    c2.textContent = fmt(t2);
}

function tick(){
    if(!running) return;

    if(active === 1){
        t1--;
        if(t1 < 0) t1 = 0;
    } else {
        t2--;
        if(t2 < 0) t2 = 0;
    }

    draw();
}

function start(){
    t1 = parseInt(document.getElementById("t1set").value) * 60;
    t2 = parseInt(document.getElementById("t2set").value) * 60;

    active = 1;
    running = true;

    c1.classList.add("active");
    c2.classList.remove("active");

    clearInterval(timer);
    timer = setInterval(tick, 1000);

    draw();
}

function switchTo(next){
    if(!running) return;

    active = next;
    c1.classList.toggle("active", active === 1);
    c2.classList.toggle("active", active === 2);
}

c1.onclick = () => switchTo(2);
c2.onclick = () => switchTo(1);

function pause(){
    running = !running;
}

function reset(){
    running = false;
    clearInterval(timer);

    t1 = parseInt(document.getElementById("t1set").value) * 60;
    t2 = parseInt(document.getElementById("t2set").value) * 60;

    active = 1;

    c1.classList.add("active");
    c2.classList.remove("active");

    draw();
}

draw();
</script>
<a href="creator.html" class="creator-btn">Creator</a>
</body>
</html>
