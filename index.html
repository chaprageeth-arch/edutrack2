<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Clock</title>

<style>
body {
margin:0;
font-family:Arial;
background:#070b18;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

h1 {
margin-bottom:10px;
color:#4facfe;
}

.clock-container {
display:flex;
gap:20px;
}

.player {
width:280px;
height:320px;
border-radius:20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:48px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
user-select:none;
}

.player1 {
background:linear-gradient(145deg,#1b2a6b,#0b1020);
border:2px solid #4facfe;
}

.player2 {
background:linear-gradient(145deg,#0f2a1f,#0b1020);
border:2px solid #2cff9b;
}

.active {
transform:scale(1.05);
box-shadow:0 0 25px rgba(79,172,254,0.5);
}

.controls {
margin-top:20px;
display:flex;
gap:10px;
}

button {
padding:10px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

.start {background:#4facfe;color:white;}
.reset {background:#ff4f4f;color:white;}

.settings {
margin-top:20px;
display:flex;
gap:10px;
}

input {
width:60px;
padding:5px;
border-radius:5px;
border:none;
text-align:center;
}
</style>
</head>

<body>

<h1>♟ Chess Clock</h1>

<div class="clock-container">

<div id="p1" class="player player1 active">05:00</div>
<div id="p2" class="player player2">05:00</div>

</div>

<div class="controls">
<button class="start" onclick="startStop()">Start / Pause</button>
<button class="reset" onclick="reset()">Reset</button>
</div>

<div class="settings">
<label>Minutes: <input id="min" value="5"></label>
</div>

<script>
let time1 = 300;
let time2 = 300;
let active = 1;
let running = false;
let interval;

const p1 = document.getElementById("p1");
const p2 = document.getElementById("p2");

function format(t){
let m = Math.floor(t/60);
let s = t%60;
return `${m}:${s.toString().padStart(2,'0')}`;
}

function update(){
p1.innerText = format(time1);
p2.innerText = format(time2);
}

function switchTurn(){
if(active===1){
active=2;
p1.classList.remove("active");
p2.classList.add("active");
}else{
active=1;
p2.classList.remove("active");
p1.classList.add("active");
}
}

p1.onclick = ()=>{ if(running){ switchTurn(); } }
p2.onclick = ()=>{ if(running){ switchTurn(); } }

function startStop(){
if(!running){
running = true;
interval = setInterval(()=>{
if(active===1){
time1--;
if(time1<=0){alert("Player 2 wins!");reset();}
}else{
time2--;
if(time2<=0){alert("Player 1 wins!");reset();}
}
update();
},1000);
}else{
running = false;
clearInterval(interval);
}
}

function reset(){
clearInterval(interval);
running=false;
active=1;

let m = parseInt(document.getElementById("min").value);
time1 = m*60;
time2 = m*60;

p1.classList.add("active");
p2.classList.remove("active");
update();
}

update();
</script>

</body>
</html>
