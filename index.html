<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chess Clock</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100vh;
        justify-content: center;
    }

    .clock-container {
        display: flex;
        gap: 20px;
    }

    .clock {
        width: 200px;
        height: 200px;
        background: #222;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        cursor: pointer;
        user-select: none;
        transition: 0.2s;
    }

    .active {
        background: #0a84ff;
    }

    .controls {
        margin-top: 20px;
    }

    button, input {
        padding: 10px;
        margin: 5px;
        font-size: 16px;
    }
</style>
</head>
<body>

<h1>♟️ Chess Clock</h1>

<div class="clock-container">
    <div id="player1" class="clock active">5:00</div>
    <div id="player2" class="clock">5:00</div>
</div>

<div class="controls">
    <input id="timeInput" type="number" value="5" min="1" /> minutes
    <button onclick="reset()">Reset</button>
    <button onclick="pause()">Pause</button>
</div>

<script>
let time1 = 300;
let time2 = 300;
let active = 1;
let running = true;

const p1 = document.getElementById("player1");
const p2 = document.getElementById("player2");

function format(t){
    let m = Math.floor(t / 60);
    let s = t % 60;
    return `${m}:${s.toString().padStart(2,'0')}`;
}

function updateDisplay(){
    p1.textContent = format(time1);
    p2.textContent = format(time2);
}

p1.onclick = () => switchTurn(2);
p2.onclick = () => switchTurn(1);

function switchTurn(next){
    if(!running) return;
    active = next;
    p1.classList.toggle("active", active === 1);
    p2.classList.toggle("active", active === 2);
}

function tick(){
    if(!running) return;

    if(active === 1){
        time1--;
        if(time1 <= 0) time1 = 0;
    } else {
        time2--;
        if(time2 <= 0) time2 = 0;
    }

    updateDisplay();
}

setInterval(tick, 1000);

function reset(){
    let mins = parseInt(document.getElementById("timeInput").value);
    time1 = mins * 60;
    time2 = mins * 60;
    active = 1;
    running = true;

    p1.classList.add("active");
    p2.classList.remove("active");

    updateDisplay();
}

function pause(){
    running = !running;
}
</script>

</body>
</html>
